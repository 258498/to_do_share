<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Partagée</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

  #screen-name {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .name-card {
    background: white; border-radius: 16px; padding: 40px; width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center;
  }
  .name-card .emoji { font-size: 48px; margin-bottom: 12px; }
  .name-card h2 { color: #1a1a2e; font-size: 22px; margin-bottom: 8px; }
  .name-card p { color: #666; font-size: 14px; margin-bottom: 24px; }
  .name-card input {
    width: 100%; padding: 10px 14px; border-radius: 8px; border: 2px solid #e0e0e0;
    font-size: 15px; outline: none; margin-bottom: 16px;
  }
  .name-card button {
    width: 100%; padding: 11px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
  }

  #screen-app { display: none; }
  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 24px 20px 28px; color: white;
  }
  .header-inner { max-width: 560px; margin: 0 auto; }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 12px; font-size: 13px; }
  .header p { opacity: 0.85; font-size: 13px; }

  .main { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .add-row input {
    flex: 1; padding: 11px 14px; border-radius: 10px; border: 2px solid #e0e0e0;
    font-size: 14px; outline: none; background: white;
  }
  .add-row input:focus { border-color: #667eea; }
  .add-row button {
    padding: 11px 18px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; font-weight: 700;
  }
  .section-label { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .todo-item {
    background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px;
  }
  .checkbox { width: 24px; height: 24px; border: 2px solid #ccc; border-radius: 6px; flex-shrink: 0; }
  .checkbox.checked {
    background: linear-gradient(135deg, #667eea, #764ba2); border: none;
    display: flex; align-items: center; justify-content: center; color: white; font-size: 14px;
  }
  .todo-text { flex: 1; font-size: 15px; color: #222; }
  .todo-text.striked { color: #aaa; text-decoration: line-through; }
  .todo-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
  .btn-validate {
    padding: 6px 12px; background: #f0f0f0; border: none; border-radius: 8px;
    cursor: pointer; font-size: 13px; color: #555; font-weight: 600; white-space: nowrap;
  }
  .btn-delete { padding: 6px 10px; background: #fff0f0; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; color: #e55; }
  .btn-undo { padding: 5px 10px; background: #f5f5f5; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; color: #888; }
  .proof-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid #e0e0e0; flex-shrink: 0; }
  .empty { text-align: center; color: #bbb; font-size: 15px; margin-top: 40px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 380px; }
  .modal h3 { font-size: 18px; margin-bottom: 6px; }
  .modal p { color: #888; font-size: 13px; margin-bottom: 20px; }
  .drop-zone {
    border: 2px dashed #d0d0d0; border-radius: 12px; padding: 32px;
    text-align: center; cursor: pointer; color: #aaa; margin-bottom: 20px;
  }
  .drop-zone .dz-icon { font-size: 36px; margin-bottom: 8px; }
  .preview-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
  .btn-change { background: none; border: none; color: #888; cursor: pointer; font-size: 13px; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 11px; background: #f0f0f0; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; }
  .btn-confirm {
    flex: 1; padding: 11px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .btn-confirm:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }

  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center; z-index: 200; padding: 20px; cursor: pointer;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; }

  .connecting { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }
</style>
</head>
<body>

<!-- Écran nom -->
<div id="screen-name">
  <div class="name-card">
    <div class="emoji">✅</div>
    <h2>Todo Partagée</h2>
    <p>Entrez votre prénom pour continuer</p>
    <input id="name-input" placeholder="Votre prénom..." onkeydown="if(event.key==='Enter') startApp()" />
    <button onclick="startApp()">Commencer →</button>
  </div>
</div>

<!-- Écran principal -->
<div id="screen-app">
  <div class="header">
    <div class="header-inner">
      <div class="header-row">
        <h1>✅ Todo Partagée</h1>
        <span class="badge" id="user-badge">👤</span>
      </div>
      <p id="stats-label">Chargement...</p>
    </div>
  </div>
  <div class="main" id="main-content">
    <div class="add-row">
      <input id="new-task" placeholder="Nouvelle tâche..." onkeydown="if(event.key==='Enter') addTodo()" />
      <button onclick="addTodo()">+</button>
    </div>
    <div id="pending-section" style="display:none">
      <div class="section-label" id="pending-label"></div>
      <div id="pending-list"></div>
    </div>
    <div id="done-section" style="display:none; margin-top:8px">
      <div class="section-label" id="done-label"></div>
      <div id="done-list"></div>
    </div>
    <div id="empty-msg" class="empty" style="display:none">Aucune tâche. Ajoutez-en une ! 🎉</div>
  </div>
</div>

<!-- Modal photo -->
<div class="modal-overlay" id="photo-modal">
  <div class="modal">
    <h3>📷 Validation par photo</h3>
    <p>Prenez une photo comme preuve de complétion.</p>
    <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="dz-icon">📷</div>
      <div class="dz-text">Cliquez pour choisir une photo</div>
    </div>
    <div id="preview-zone" style="display:none; text-align:center; margin-bottom:20px">
      <img id="preview-img" class="preview-img" />
      <br><button class="btn-change" onclick="resetPreview()">↩ Changer de photo</button>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" id="btn-confirm" disabled onclick="confirmValidation()">✓ Valider</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="" alt="preuve" />
</div>

<script src="config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadString, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const app = initializeApp(window.FIREBASE_CONFIG);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let userName = "";
  let currentTodoId = null;
  let previewData = null;

  window.startApp = function () {
    const n = document.getElementById("name-input").value.trim();
    if (!n) return;
    userName = n;
    document.getElementById("screen-name").style.display = "none";
    document.getElementById("screen-app").style.display = "block";
    document.getElementById("user-badge").textContent = "👤 " + userName;
    listenTodos();
  };

  function listenTodos() {
    onSnapshot(collection(db, "todos"), snap => {
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      items.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
      renderTodos(items);
    });
  }

  function renderTodos(todos) {
    const pending = todos.filter(t => !t.done);
    const done = todos.filter(t => t.done);

    document.getElementById("stats-label").textContent =
      `${done.length}/${todos.length} tâches complétées · Photo obligatoire pour valider`;

    const pSection = document.getElementById("pending-section");
    if (pending.length > 0) {
      pSection.style.display = "block";
      document.getElementById("pending-label").textContent = `À faire · ${pending.length}`;
      document.getElementById("pending-list").innerHTML = pending.map(t => `
        <div class="todo-item">
          <div class="checkbox"></div>
          <div style="flex:1"><div class="todo-text">${esc(t.text)}</div></div>
          <button class="btn-validate" onclick="openModal('${t.id}')">📷 Valider</button>
          <button class="btn-delete" onclick="deleteTodo('${t.id}')">🗑</button>
        </div>`).join("");
    } else { pSection.style.display = "none"; }

    const dSection = document.getElementById("done-section");
    if (done.length > 0) {
      dSection.style.display = "block";
      document.getElementById("done-label").textContent = `Terminées · ${done.length}`;
      document.getElementById("done-list").innerHTML = done.map(t => `
        <div class="todo-item">
          <div class="checkbox checked">✓</div>
          <div style="flex:1">
            <div class="todo-text striked">${esc(t.text)}</div>
            <div class="todo-meta">par ${esc(t.completedBy || "")} · ${esc(t.completedAt || "")}</div>
          </div>
          ${t.photo ? `<img class="proof-thumb" src="${t.photo}" onclick="openLightbox('${t.photo}')" />` : ""}
          <button class="btn-undo" onclick="uncomplete('${t.id}')">↩</button>
        </div>`).join("");
    } else { dSection.style.display = "none"; }

    document.getElementById("empty-msg").style.display = todos.length === 0 ? "block" : "none";
  }

  window.addTodo = async function () {
    const input = document.getElementById("new-task");
    const text = input.value.trim();
    if (!text) return;
    await addDoc(collection(db, "todos"), {
      text, done: false, photo: null, completedBy: null, completedAt: null, createdAt: serverTimestamp()
    });
    input.value = "";
  };

  window.deleteTodo = async function (id) {
    await deleteDoc(doc(db, "todos", id));
  };

  window.openModal = function (id) {
    currentTodoId = id; previewData = null;
    document.getElementById("drop-zone").style.display = "block";
    document.getElementById("preview-zone").style.display = "none";
    document.getElementById("btn-confirm").disabled = true;
    document.getElementById("file-input").value = "";
    document.getElementById("photo-modal").classList.add("open");
  };

  window.closeModal = function () {
    document.getElementById("photo-modal").classList.remove("open");
    currentTodoId = null; previewData = null;
  };

  window.handleFile = function (input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      previewData = ev.target.result;
      document.getElementById("preview-img").src = previewData;
      document.getElementById("drop-zone").style.display = "none";
      document.getElementById("preview-zone").style.display = "block";
      document.getElementById("btn-confirm").disabled = false;
    };
    reader.readAsDataURL(file);
  };

  window.resetPreview = function () {
    previewData = null;
    document.getElementById("drop-zone").style.display = "block";
    document.getElementById("preview-zone").style.display = "none";
    document.getElementById("btn-confirm").disabled = true;
    document.getElementById("file-input").value = "";
  };

  window.confirmValidation = async function () {
    if (!previewData || !currentTodoId) return;
    const btn = document.getElementById("btn-confirm");
    btn.disabled = true; btn.textContent = "⏳ Upload...";
    try {
      const storageRef = ref(storage, `proofs/${currentTodoId}_${Date.now()}.jpg`);
      await uploadString(storageRef, previewData, "data_url");
      const photoURL = await getDownloadURL(storageRef);
      await updateDoc(doc(db, "todos", currentTodoId), {
        done: true, photo: photoURL,
        completedBy: userName,
        completedAt: new Date().toLocaleString("fr-FR"),
      });
      closeModal();
    } catch (e) { alert("Erreur upload : " + e.message); }
    btn.disabled = false; btn.textContent = "✓ Valider";
  };

  window.uncomplete = async function (id) {
    await updateDoc(doc(db, "todos", id), { done: false, photo: null, completedBy: null, completedAt: null });
  };

  window.openLightbox = function (url) {
    document.getElementById("lightbox-img").src = url;
    document.getElementById("lightbox").classList.add("open");
  };

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
</script>
</body>
</html>
